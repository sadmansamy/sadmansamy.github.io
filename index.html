<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qsamy Image Gallery</title>
    <style>
        body { margin: 0; background: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #333; }
        
        /* Modern Button Styles */
        .nav-container { padding: 30px 20px; display: flex; justify-content: center; }
        .modern-btn { 
            background: #000; color: #fff; padding: 14px 28px; border-radius: 50px; 
            text-decoration: none; font-weight: 600; font-size: 0.95rem; 
            transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .modern-btn:hover { background: #333; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }

        h2 { padding: 20px; margin: 0; font-size: 1.2rem; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; padding: 0 16px 30px 16px; }
        .gallery img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; display: block; cursor: pointer; border-radius: 12px; background: #f0f0f0; transition: transform 0.2s; }
        .gallery img:hover { transform: scale(0.98); }
        
        #viewer { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.98); display:none; flex-direction:column; align-items:center; justify-content:center; z-index: 1000; }
        #viewer img { max-width: 90%; max-height: 70%; object-fit: contain; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .controls { color: #000; margin-top: 20px; text-align: center; max-width: 90%; }
        .copy-btn { padding: 12px 24px; cursor: pointer; border-radius: 8px; border: none; background: #f0f0f0; font-weight: 600; margin-top: 15px; transition: background 0.2s; }
        .copy-btn:hover { background: #e0e0e0; }
    </style>
</head>
<body>

    <div class="nav-container">
        <a href="https://samy.nav.bd/img/" class="modern-btn" target="_blank">Open Image Directory →</a>
    </div>

    <h2>Samy Gallery</h2>
    <div class="gallery" id="samyGallery"></div>

    <h2>Favicon Gallery</h2>
    <div class="gallery" id="bitwGallery"></div>

    <div id="viewer" onclick="this.style.display='none'">
        <img id="viewImg" src="" alt="Full view">
        <div class="controls" onclick="event.stopPropagation()">
            <p id="imgLink" style="font-size: 0.8rem; color: #888; word-break: break-all;"></p>
            <button class="copy-btn" onclick="copyData()">Copy Image Link</button>
        </div>
    </div>

    <script>
        const samyGallery = document.getElementById('samyGallery');
        const bwiGallery = document.getElementById('bitwGallery');

        function createImg(src, container) {
            const img = document.createElement('img');
            img.src = src;
            img.onerror = function() { this.style.display = 'none'; };
            img.onclick = () => showViewer(src);
            container.appendChild(img);
        }

            // 1. Manual list of images (1-10)
    const manualImages = ["1.png", "2.png", "3.png", "4.png", "5.png", "6.png", "7.png", "8.png", "9.png", "10.png, "11.png", "12.png", "13.png", "14.png", "15.png", "16.png", "17.png", "18.png, "19.png", "20.png", "21.png", "6.png", "7.png", "8.png", "9.png", "10.png, "3.png", "4.png", "5.png", "6.png", "7.png", "8.png", "9.png", "10.png1, "3.png", "4.png", "5.png", "6.png", "7.png", "8.png", "9.png", "10.png, "3.png", "4.png", "5.png", "6.png", "7.png", "8.png", "9.png", "10.png, "3.png", "4.png", "5.png", "6.png", "7.png", "8.png", "9.png", "10.png, "3.png", "4.png", "5.png", "6.png", "7.png", "8.png", "9.png", "10.png, "3.png", "4.png", "5.png", "6.png", "7.png", "8.png", "9.png", "10.png, "3.png", "4.png", "5.png", "6.png", "7.png", "8.png", "9.png", "10.png"];
    
    manualImages.forEach(fileName => {
        createImg("https://samy.nav.bd/img/" + fileName, samyGallery);
    });


        // 2. Samy Nav JSON
        fetch('img.json').then(r => r.json()).then(data => {
            data.forEach(fileName => createImg("https://samy.nav.bd/img/" + fileName, samyGallery));
        }).catch(() => {});

        // 3. Manual BWI Subdomains
        const subs = ["a","b","c","d","e","f","g","h","i","j","k","l","m","n","o","p","q","r","s","t","u","v","w","x","y","z",
                      "aa","bb","cc","dd","ee","ff","gg","hh","ii","jj","kk","ll","mm","nn","oo","pp","qq","rr","ss","tt","uu","vv","ww","xx","yy","zz"];
        
        subs.forEach(s => createImg(`https://${s}.bitw.pages.dev/icon.png`, bwiGallery));

        function showViewer(src) {
            document.getElementById('viewImg').src = src;
            document.getElementById('imgLink').innerText = src;
            document.getElementById('viewer').style.display = 'flex';
        }

        function copyData() {
            navigator.clipboard.writeText(document.getElementById('viewImg').src);
            alert("Link copied to clipboard!");
        }
    </script>
</body>
</html>
