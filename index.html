<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image PNG</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="shortcut icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta property="og:image" content="icon.png">

    <style>
        /* Automatically centers the image on a dark screen for visitors */
        body {
            margin: 0;
            background: #0e0e0e;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <img src="icon.png" alt="Image PNG">

</body>
</html>
